            background-size: cover;
            background-position: center 30%;
            filter: brightness(0.12) blur(2px);
            transform: scale(1.04);
        }
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 60%, rgba(42,109,255,0.07) 0%, transparent 65%),
                        linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.75) 100%);
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 80px 80px;
            mask-image: radial-gradient(ellipse at 50% 50%, black 30%, transparent 80%);
        }

        .scanline {
            position: fixed;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, rgba(42,109,255,0.5), transparent);
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes scan {
            0%   { top: -2px; opacity: 0; }
            5%   { opacity: 1; }
            95%  { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 60px;
        }
        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            letter-spacing: 0.25em;
            color: #fff;
            text-decoration: none;
        }
        .nav-logo span { color: var(--accent); }
        .nav-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--dim);
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #ff3b3b;
            box-shadow: 0 0 8px rgba(255,59,59,0.8);
            animation: pulse-red 1.5s ease-in-out infinite;
        }
        @keyframes pulse-red {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        main {
            position: relative;
            z-index: 50;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 40px;
        }

        .error-ghost {
            position: absolute;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(180px, 28vw, 380px);
            letter-spacing: 0.02em;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.04);
            line-height: 1;
            user-select: none;
            pointer-events: none;
            animation: ghostPulse 6s ease-in-out infinite;
        }
        @keyframes ghostPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .error-eyebrow {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 0.7s 0.2s forwards;
        }

        .error-badge {
            display: inline-flex;
            align-items: center;
            gap: 16px;
            padding: 10px 28px;
            border: 1px solid rgba(255,59,59,0.3);
            background: rgba(255,59,59,0.05);
            margin-bottom: 28px;
            opacity: 0;
            animation: fadeUp 0.7s 0.35s forwards;
        }
        .error-badge-code {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px;
            letter-spacing: 0.06em;
            line-height: 1;
            color: #fff;
        }
        .error-badge-sep {
            width: 1px;
            height: 40px;
            background: rgba(255,59,59,0.3);
        }
        .error-badge-text {
            text-align: left;
        }
        .error-badge-label {
            font-size: 9px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(255,59,59,0.7);
        }
        .error-badge-msg {
            font-size: 14px;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.6);
            margin-top: 3px;
        }

        .error-heading {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(40px, 6vw, 76px);
            letter-spacing: 0.05em;
            line-height: 0.95;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 0.7s 0.5s forwards;
        }
        .error-heading span {
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.22);
        }

        .error-sub {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 300;
            font-style: italic;
            color: var(--dim);
            max-width: 380px;
            line-height: 1.65;
            margin-bottom: 52px;
            opacity: 0;
            animation: fadeUp 0.7s 0.65s forwards;
        }

        .error-actions {
            display: flex;
            gap: 14px;
            opacity: 0;
            animation: fadeUp 0.7s 0.8s forwards;
        }
        .btn-back {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--black);
            background: #fff;
            border: none;
            padding: 16px 40px;
            cursor: none;
            transition: background 0.3s, transform 0.3s;
        }
        .btn-back:hover { background: var(--accent); color: #fff; transform: translateY(-2px); }
        .btn-home {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: #fff;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.22);
            padding: 16px 40px;
            cursor: none;
            transition: border-color 0.3s, transform 0.3s;
        }
        .btn-home:hover { border-color: #fff; transform: translateY(-2px); }

        .error-footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 50;
            border-top: 1px solid var(--border);
            padding: 16px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        .error-footer-left {
            font-size: 10px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.18);
        }
        .error-footer-right {
            font-size: 10px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.18);
        }
        .error-footer-right span { color: var(--accent); }

        .corner {
            position: fixed;
            width: 20px; height: 20px;
            z-index: 50;
        }
        .corner-tl { top: 20px; left: 20px; border-top: 1px solid rgba(255,255,255,0.15); border-left: 1px solid rgba(255,255,255,0.15); }
        .corner-tr { top: 20px; right: 20px; border-top: 1px solid rgba(255,255,255,0.15); border-right: 1px solid rgba(255,255,255,0.15); }
        .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid rgba(255,255,255,0.15); border-left: 1px solid rgba(255,255,255,0.15); }
        .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid rgba(255,255,255,0.15); border-right: 1px solid rgba(255,255,255,0.15); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            body { cursor: auto; }
            .cursor, .cursor-ring { display: none; }
            
            nav { padding: clamp(12px, 3vw, 28px) clamp(16px, 4vw, 60px); }
            .nav-logo { font-size: clamp(16px, 4vw, 26px); }
            .nav-status { font-size: clamp(8px, 1.5vw, 10px); gap: clamp(6px, 1vw, 10px); }
            
            main { padding: 0 clamp(16px, 4vw, 40px); }
            
            .error-ghost { font-size: clamp(80px, 20vw, 200px); }
            .error-eyebrow { font-size: clamp(10px, 1.5vw, 13px); }
            .error-badge { max-width: 100%; }
            .error-badge-code { font-size: clamp(28px, 6vw, 42px); }
            .error-heading { font-size: clamp(32px, 8vw, 56px); }
            .error-sub { font-size: clamp(14px, 2.5vw, 18px); padding: 0 clamp(8px, 2vw, 20px); }
            
            .error-actions { flex-direction: column; gap: 12px; }
            .btn-back, .btn-home { width: 100%; min-height: 44px; padding: clamp(12px, 2vw, 18px) clamp(16px, 3vw, 32px); }
            
            .error-footer { flex-direction: column; padding: clamp(16px, 3vw, 20px); gap: 12px; }
            .error-footer-left { font-size: clamp(9px, 1.5vw, 11px); }
            .error-footer-right { font-size: clamp(9px, 1.5vw, 11px); }
            
            .corner { width: clamp(12px, 3vw, 30px); height: clamp(12px, 3vw, 30px); }
        }

        @media (max-width: 480px) {
            .error-ghost { font-size: clamp(60px, 15vw, 120px); }
            .error-heading { font-size: clamp(24px, 6vw, 40px); line-height: 1.2; }
            .error-sub { font-size: clamp(12px, 2vw, 16px); }
        }

        @media (hover: none) and (pointer: coarse) {
            .btn-back, .btn-home { min-height: 48px; min-width: 48px; }
        }
    </style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="bg"></div>
<div class="bg-overlay"></div>
<div class="grid-lines"></div>
<div class="scanline"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<nav>
    <a href="/" class="nav-logo">DE <span>DARK</span></a>
    <div class="nav-status">
        <div class="status-dot"></div>
        System Fault Detected
    </div>
</nav>

<main>
    <div class="error-ghost" id="ghostCode">404</div>
    <p class="error-eyebrow">Kai Studio — Navigation System</p>
    <div class="error-badge">
        <div class="error-badge-code" id="badgeCode">404</div>
        <div class="error-badge-sep"></div>
        <div class="error-badge-text">
            <div class="error-badge-label">Status Code</div>
            <div class="error-badge-msg" id="badgeMsg">Route not found</div>
        </div>
    </div>
    <h1 class="error-heading">
        Lost in the<br><span>Dark</span>
    </h1>
    <p class="error-sub">
        The road you're looking for doesn't exist — or it's been swallowed by shadow. Let us guide you back.
    </p>

    <div class="error-actions">
        <button class="btn-back" onclick="window.history.back()">Go Back</button>
        <button class="btn-home" onclick="window.location.href='/'">Return Home</button>
    </div>
</main>

<div class="error-footer">
    <div class="error-footer-left">De Dark Hypercar — dedark.kaistudio.pp.ua</div>
    <div class="error-footer-right">Dark Time Series — <span>1 of 33</span></div>
</div>

<script>
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function animateCursor() {
        cursor.style.left = (mx - 3.5) + 'px';
        cursor.style.top  = (my - 3.5) + 'px';
        rx += (mx - rx) * 0.12;
        ry += (my - ry) * 0.12;
        ring.style.left = (rx - 17) + 'px';
        ring.style.top  = (ry - 17) + 'px';
        requestAnimationFrame(animateCursor);
    })();

    const params = new URLSearchParams(window.location.search);
    const code = params.get('code') || '404';
    const messages = {
        '404': 'Route not found',
        '403': 'Access restricted',
        '500': 'Internal server fault',
        '503': 'System unavailable',
    };
    document.getElementById('badgeCode').textContent = code;
    document.getElementById('badgeMsg').textContent = messages[code] || 'Unexpected error';
    document.getElementById('ghostCode').textContent = code;
</script>
</body>
</html>
